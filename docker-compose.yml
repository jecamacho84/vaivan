services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vaivan_app
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
    networks:
      - vaivan

  nginx:
    image: nginx:1.27-alpine
    container_name: vaivan_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - vaivan

  mysql:
    image: mysql:8.4
    container_name: vaivan_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vaivan
      MYSQL_USER: vaivan
      MYSQL_PASSWORD: vaivan
    ports:
      - "33066:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - vaivan

  redis:
    image: redis:7-alpine
    container_name: vaivan_redis
    ports:
      - "63790:6379"
    networks:
      - vaivan

volumes:
  mysql_data:

networks:
  vaivan:
    driver: bridge
